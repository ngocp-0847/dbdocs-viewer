apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbdocs-viewer
  namespace: fpaasrequirementdefinition-2038
  labels:
    app: dbdocs-viewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbdocs-viewer
  template:
    metadata:
      labels:
        app: dbdocs-viewer
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: dbdocs-viewer
          image: sun-k8s-private-registry.sun-asterisk.vn/dbdocs-viewer:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
