apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbdocs-api
  namespace: fpaasrequirementdefinition-2038
  labels:
    app: dbdocs-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbdocs-api
  template:
    metadata:
      labels:
        app: dbdocs-api
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: dbdocs-api
          image: sun-k8s-private-registry.sun-asterisk.vn/dbdocs-api:latest
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              value: postgres://postgres:postgres@postgres:5432/sbi_fpaas
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 10
